version: '3.8'

services:
  # Frontend with Hot Reload (Vite HMR)
  claude-trader-frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: claude-trader-frontend-dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
      - ./frontend/index.html:/app/index.html:ro
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3001/api
      - VITE_WS_URL=ws://localhost:3001
    command: npm run dev -- --host 0.0.0.0
    networks:
      - claude-trader-dev

  # API Gateway with Hot Reload (nodemon)
  claude-trader-api-gateway-dev:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile.dev
    container_name: claude-trader-api-gateway-dev
    ports:
      - "3001:3001"
    volumes:
      - ./backend/api-gateway/src:/app/src:ro
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3001
      - CLAUDE_ENGINE_URL=http://claude-trader-engine-dev:8000
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=trader_db
      - POSTGRES_USER=trader
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
    command: npm run dev
    depends_on:
      - claude-trader-engine-dev
    networks:
      - claude-trader-dev
      - claude-trader_default

  # Claude Engine with Hot Reload (uvicorn --reload)
  claude-trader-engine-dev:
    build:
      context: ./backend/claude-engine
      dockerfile: Dockerfile.dev
    container_name: claude-trader-engine-dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend/claude-engine/app:/app/app:ro
      - ${OCTOBOT_DIR:-./octobot}/external-data-sources:/app/external_data_sources:ro
      - ${OCTOBOT_DIR:-./octobot}/tentacles/Evaluator/TA/claude_evaluator:/app/claude_evaluator:ro
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - TAAPI_API_KEY=${TAAPI_API_KEY}
      - DATABASE_URL=postgresql://trader:${POSTGRES_PASSWORD:-changeme}@postgres:5432/trader_db
      - ENVIRONMENT=development
      - PYTHONUNBUFFERED=1
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - claude-trader-dev
      - claude-trader_default

networks:
  claude-trader-dev:
    driver: bridge
  claude-trader_default:
    external: true

