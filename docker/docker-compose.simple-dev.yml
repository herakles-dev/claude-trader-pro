version: '3.8'

services:
  # Claude Engine with Hot Reload (simpler setup)
  claude-trader-engine-dev:
    build:
      context: ./backend/claude-engine
      dockerfile: Dockerfile.dev
    container_name: claude-trader-engine-dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend/claude-engine/app:/app/app
      - ${OCTOBOT_DIR:-./octobot}/external-data-sources:/app/external_data_sources:ro
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATABASE_URL=postgresql://trader:${POSTGRES_PASSWORD:-changeme}@postgres:5432/trader_db
      - PYTHONUNBUFFERED=1
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app
    networks:
      - claude-trader_default
    restart: unless-stopped

networks:
  claude-trader_default:
    external: true
